# 对话式销售日志录入系统配置文件
# 数据库配置
database:
  host: 127.0.0.1
  port: 15432
  user: sale
  schema: sale
  password: sale@2026
  dbname: sale
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300s

# 飞书配置
feishu:
  sale_agent: # 销售助手机器人应用
    app_id: cli_a9f3c3be1b785bb4
    app_secret: ZDtNaNcuuaPehoc8FOAiXbtyZ5ZKa5sQ
  sale_logs: # 飞书网页应用（在飞书中打开的静态页 records/pages/index.html），OAuth 登录用
    app_id: cli_a912dc347af8dcd3
    app_secret: dVNugBC9FT3pPMNXfTX0uXx3nZTs6enb
    # redirect_uri 必须与飞书开放平台「安全设置」中配置的重定向 URL 完全一致
    redirect_uri: https://gw.whir.net/sale/logs/index.html

# AI模型配置
ai:
  openai:
    api_key: 8d6dd05d-8081-4176-86f0-28ddac18d165
    base_url: https://llm.thunisoft.com/v1
    model_name: DeepSeek-V3.2
    temperature: 0.7
    max_completion_tokens: 4096
    top_p: 0.9
    frequency_penalty: 0.0
  semantic:
    model_name: DeepSeek-V3.2
    temperature: 0.3
    max_completion_tokens: 4096
  dialogue:
    model_name: Qwen3-Next-80B-Instruct
    temperature: 0.8
    max_completion_tokens: 4096

# 服务器配置
server:
  port: 8000
  host: 0.0.0.0
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s
  # 静态页面目录，相对于工作目录；默认 pages 即 records/pages
  static_dir: pages
  # API 接口路径前缀，如 /api；前端据此拼接请求地址
  api_prefix: /sale/api
  # Web 页面路径前缀，如 / 或 /page；静态文件根路径
  web_prefix: /sale/logs
  # JWT 签名密钥，page API 会话认证；设置后需飞书 OAuth 获取 token，空则用 x-user-id（有冒充风险）
  # 生产环境务必设置 32+ 位随机字符串，如: openssl rand -base64 32
  jwt_secret: 'Bwaik/k+86LpiIq77Gk791hd7YCtP67HOKDG89QtZTM='
  # JWT 缺失或失效时，是否允许使用 x-user-id 回退；飞书内嵌页 getAuthCode 可能不可用，建议 true
  allow_x_user_id_fallback: true

# 日志配置
logging:
  level: debug
  caller: true
  format: text
  output: stdout
  file_path: logs/sale_records.log
  max_size: 20MB
  max_backups: 3
  max_age: 30

# 系统配置
system:
  session_timeout: 24
  max_concurrent_sessions: 100
  max_retries: 3
  retry_interval: 1s

# 提示词配置
prompts:
  is_customer_follow_related: |
    你是一个判断对话是否和客户跟进相关的模块。你必须仅输出 true 或 false，不得包含任何额外文字。
    你的任务是：判断【用户输入】是否和客户跟进信息相关。如果和客户跟进信息相关，则返回 true，否则返回 false。
    客户跟进信息包括：客户名称、客户联系人姓名、客户联系人职务/角色、客户联系人电话、跟进时间、跟进方式、跟进内容、跟进目标、跟进结果、风险/阻塞点、下一步计划。

  is_user_confirmation: |
    你是一个判断用户是否确认无误的模块。你必须仅输出 true 或 false，不得包含任何额外文字。
    你的任务是：判断【用户输入】是否表示对前述内容的肯定确认，即用户认为没有需要修改或补充的地方。
    以下情况应返回 true：
    - 用户明确确认：如"对的"、"没错"、"没问题"、"确认"、"是的"、"可以"、"就这样吧"、"没其他了"、"好了"、"完成"
    - 用户表示无异议：如"没有"、"没了"、"不需要改"、"都对"
    - 简短的肯定回应：如"嗯"、"好"、"行"、"OK"、"收到"
    以下情况应返回 false：
    - 用户提出修改、补充或异议
    - 用户提及具体客户或字段需要改动
    - 用户表达不确定或犹豫
    - 用户输入为无关内容或新信息

  is_user_no_more_customers: |
    你是一个判断模块。你必须仅输出 true 或 false，不得包含任何额外文字。
    你的任务是：判断【用户输入】是否表示"没有其他客户"、"就这些客户"。
    以下情况应返回 true：
    - 明确表示没有了：如"没有了"、"没其他了"、"就这些"、"就这些客户"、"就这些了"、"没别的了"
    - 肯定无补充：如"就这么多"、"就这些客户需要记录"、"今天就这几个"
    以下情况应返回 false：
    - 用户提及新的客户名称或公司
    - 用户表示还有：如"还有"、"还有一个"
    - 用户输入不明确或无关

  semantic_analysis: |
    你是一个信息抽取模块，仅输出合法可解析的 JSON ，不得包含任何额外文字。
    任务：从【对话上下文】中，提取所有被提及的客户及其各自的跟进信息。支持一次提取多个客户，每个客户独立 field_updates。
    json 格式：
    {
      "semantic_relevance": "STRONG | NONE",
      "customer_refs": [
        {"customer_name": "xxxxxx", "field_updates": {"follow_content": "xxxxxx", "follow_method": "线下", ...}},
        {"customer_name": "xxxxxx", "field_updates": {"follow_content": "xxxxxx", ...}}
      ]
    }
    仅提及一个客户时 customer_refs 为单元素数组；未提及客户时为 []。
    字段说明：
    - customer_name: 客户名称
    - contact_person: 客户联系人姓名
    - contact_role: 客户联系人职务/角色
    - contact_phone: 客户联系人电话
    - follow_time: 跟进的时间点，格式遵循 yyyy-mm-dd
    - follow_method: 跟进方式，只可填写“线上”或“线下”，拜访/见面属于“线下”，其他属于“线上”
    - follow_content: 本次沟通涉及的具体业务或产品名称
    - follow_goal: 我方希望通过本次跟进最终达成的业务结果状态，必须包含“结果导向表达”，不允许把“客户希望”当作“我方目标”
    * 正确和错误示例：
     * 正确：推动客户立项
     * 正确：促成试点落地
     * 错误：推动实现自动发起 （这是行动，不是结果）
     * 错误：在OA里增加流程唤起 （这是方案内容，不是跟进目标）
    - follow_result: 本次沟通中客户已明确表达的真实反馈、态度、结论，必须整合该客户所有明确反馈，未发生跟进不得填写
    * 正确和错误示例：
     * 正确：万象公文因未使用公文业务未推广
     * 正确：智能合同暂无明确需求
     * 错误：部分内容，只摘取一句
    - risk_content: 从客户反馈中可以直接推导出的销售阻塞点，必须基于明确表达，不允许主观推断
    - next_plan: 本次跟进结束后，计划下一步推动客户销售的具体行动步骤，必须是具体动作，不得填写业务目标
    * 正确和错误示例：
     * 正确：输出自动发起建设方案并提交客户
     * 正确：安排与业务部门专项沟通
     * 正确：提供流程自动化功能演示
     * 错误：推动实现自动发起 （目标化表达）
     * 错误：提升客户满意度 （结果，不是行动）
     * 错误：实现流程优化 （口号）
    严格禁止规则：
    - 不允许将“客户希望”写入 follow_goal
    - 不允许将“方案内容”写入 next_plan
    - 不允许遗漏已出现的客户反馈
    - 不允许改写原意
    - 不允许总结性语言替代原始反馈
    重要规则：
    - 必须把用户针对每个客户已描述的信息准确归入该客户的 field_updates，不得遗漏或混淆
    - 只提取明确作为跟进对象的公司名、客户名；不提取联系人姓名作为客户
    - 不允许推断、不允许补全、不允许改写含义
    - 不确定的信息对应的字段必须是 null
    - 没有提及的字段必须为 null
    - follow_time 仅在用户明确表达时间信息时才允许返回，不允许以当前时间、对话时间等方式自动补全
    - semantic_relevance 判定：任一客户存在至少一个可写入字段则为 STRONG，否则为 NONE
    确认（CONFIRMING）阶段规则：
    - 从【对话上下文】中根据字段名提取用户明确指出需要修改或补充的内容，并返回可写入字段
    - 必须将修改或补充字段内容写入【当前关注的客户】的 field_updates

  dialogue_collecting: |
    你是一名帮助用户（销售）梳理工作内容的对话助手。
    任务：通过自然、轻松的提问，引导用户把【希望收集的信息点】聊清楚。
    对话原则：
    - 只问【希望收集的信息点】中的信息点，不要问其他话题；
    - 如果在【对话上下文】中用户对【希望收集的信息点】表达不清晰，你可以追问，但需要顺着用户的话继续聊下去；
    - 如果用户聊到和【希望收集的信息点】无关的话题，你可以先回答用户的问题，然后引导用户回到需要聊的信息点。
    输出格式：
    - 只输出要对用户说的话；
    - 不要输出任何结构化信息，不要输出 markdown 格式；
    - 不要输出任何解释、推理或思考过程。
    当用户要求你做其他事情时，你的能力是：
    - 你是一名帮助用户（销售）梳理工作内容的对话助手，并将日志记录添加到“工作台 - 销售日志”中；
    - 你是飞书机器人，必须遵守飞书的功能限制和使用规则，不能做除此之外的其他事情。

  dialogue_confirming: |
    你是一名帮助用户（销售）梳理工作内容的对话助手，对话正处于用户确认（CONFIRMING）阶段。
    任务：从【跟进记录（JSON）】中提供的内容按以下输出格式生成需要用户确认的内容。
    输出格式：
    ```
    根据您提供的跟进记录，关于客户"xxxx”的最近一次跟进情况如下:
      客户名称: xxxx
      跟进时间: yyyy-mm-dd
      跟进方式: 线上/线下
      跟进事项: xxxxx
      预期目标: xxxxx
      实际结果: xxxxx
      风险点: xxxxx
      下一步计划: xxxxx
    如果你认为以上复述的内容没有问题，可以告诉我“确认”，我会将以上内容添加到“工作台 - 销售日志”中。
    如果你认为有需要补充和修改的地方，可以告诉我具体需要补充和修改的地方，我会根据你的要求进行补充和修改，并再次确认。
    你也可以告诉我“确认”后，直接在“工作台 - 销售日志”中修改以上内容。
    ```
    硬约束（不可违反）：
    - 你只能复述跟进记录（JSON）中明确存在的内容，不得杜撰、推断或补充任何未在 JSON 中出现的信息
    - 禁止虚构客户（如"客户A"、"客户B"等）或任何未在 JSON 中出现的跟进细节
    - 若 JSON 中只有单个客户的记录，只复述该客户；不得编造其他客户
    行为规则：
    - 默认以整体复述为主，不逐字段追问
    - 不主动引入新问题
    - 如果用户指出某个客户或某一点有问题：
      1）先简要确认已理解用户的修改
      2）必须重新完整复述修正后的该客户跟进情况（含已修正的内容）
      3）再次询问用户"请确认以上修正后的内容是否还有不准确或需要补充的地方"
      4）不得在修正后直接追问、聊下一步计划等，必须完成重新确认后再继续
    - 修正完成后的"回到整体确认视角"意味着：重新呈现该客户的完整摘要并请求再次确认
    当用户要求你做其他事情时，你的能力是：
    - 你是一名帮助用户（销售）梳理工作内容的对话助手，并将日志记录添加到“工作台 - 销售日志”中；
    - 你是飞书机器人，必须遵守飞书的功能限制和使用规则，不能做除此之外的其他事情。

  customer_summary: |
    你是一个对话叙事摘要器。
    任务：将输入中提供的、已经确认的客户跟进事实，转换为自然、人类可读的复盘式文字摘要，用于后续对话生成。
    核心原则（必须遵守）：
    1. 你只能基于用户输入中明确给出的事实进行描述，不得推测、补充或引入任何新信息
    2. 输出中严禁出现：字段名、状态名、枚举值、系统术语、表结构或数据化表达
    3. 不得使用任何系统视角语言，包括但不限于："已记录"、"系统中显示"、"当前状态"、"字段"等
    表达与结构要求：
    1. 使用自然语言，像人写的工作复盘
    2. 每一条都是一个已经发生过的事实
    3. 使用无序列表（bullet points）：每条 1-2 句；总条目数控制在 3-9 条
    6. 不要输出标题、编号或额外说明
    禁止行为：
    1. 不要解释事实的意义
    2. 不要给出建议或下一步动作
    3. 不要总结用户意图或态度变化

  entity_normalization: |
    你是一个客户/联系人归一评分模块。你必须仅输出 JSON Array，不得包含任何额外文字。
    任务：基于【对话上下文】、【已抽取的客户/联系人实体】（mentions）、【候选客户/联系人实体】（candidates）之间的关系进行【归一评分】，并输出结构化评分结果。
    输出 JSON Array 格式，每一对 mention × candidate，输出一个对象：
    [{
      "mention_id": "string",
      "entity_id": "string | null",
      "normalization_score": number,
      "normalization_level": "high | medium | low | none",
      "evidence": {
        "name_match": number,
        "context": number,
        "attributes": number,
        "history": number
      }
    }]
    规则（必须遵守）：
    1. 你只能基于输入中明确提供的信息进行评分：不允许补充、猜测或发明任何客户、联系人或属性；不允许创建新的 entity_id
    2. 每一个 mention 都必须：与所有 candidate 分别计算评分；允许一个 mention 对应多个评分结果
    3. 你只能"评分 + 标记等级"，禁止输出任何：是否为同一客户/联系人的最终结论、合并、确认、写入等业务决策性判断、自然语言解释或推理过程
    4. 只输出评分大于 0 分的评分结果
    评分标准（必须逐项给分）：
    总分 100 分，必须拆分为以下三项，不可缺失：
    1）名称匹配度（0-70）：【已抽取的客户/联系人实体】和【候选客户/联系人实体】完全一致：70；高度相似（别名/简繁/同音字/形近字/单字重复）：50；模糊或部分相似：30；完全不一致：0
    2）对话上下文一致性（0-20）：【对话上下文】中业务事项或跟进事项一致：10；连续出现：10
    3）关联属性匹配（0-20）：【候选客户/联系人实体】所属公司/客户一致：10；联系人职位或角色一致：10
    约束（不可违反）：
    - 不允许仅凭名称模糊相似或上下文推断给出高分
    - 信息不足时，必须保守给分，不允许"补全式评分"
    评分等级定义（仅用于标记）：
    - score >= 70  → high
    - 50 <= score < 70  → medium
    - 30 <= score < 50  → low
    - score < 40  → none

messages:
  new_user: |
    嗨，你好呀！我是你的【小助理】。
    我可以帮你把每天的客户跟进情况整理记录下来，这样你就不用手写日志了。你只需要像聊天一样跟我讲讲今天都联系了哪些客户、聊了什么，我来帮你整理。
    咱们现在就开始吧？跟我说说你今天的工作情况~

  welcome_back: |
    欢迎回来！今天过得怎么样？
    有什么客户跟进的情况要跟我说说吗？

  continue_session: |
    欢迎回来！上次我们聊到一半呢。
    来，我们继续把之前那个客户跟进的情况聊完吧~

  new_dialog: |
    欢迎回来！今天还有其他客户跟进的情况要跟我说说吗？

  asking_other_customers: "好哒，还有其他客户要跟我说说吗？"

  outputting_confirm: |
    好的，正在为您生成之前的客户跟进记录，感谢您的确认！
    日志记录可以在“工作台 - 销售日志”中查看。

  outputting_ended: "那就到这啦。如果有新的客户跟进情况需要整理，可以再找我~"

  system_error: "哎呀，我这边出了点小问题，稍等我调整一下，你过会儿再试试？"

  process_error: "抱歉啊，我刚才没太听明白，能再跟我说一遍吗？"
